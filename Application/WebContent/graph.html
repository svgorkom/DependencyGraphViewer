<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #fff; }
  #cy { width: 100%; height: 100vh; }
  #tooltip {
    position: absolute; display: none; pointer-events: none;
    background: rgba(44,62,80,0.92); color: #fff; padding: 8px 12px;
    border-radius: 6px; font: 12px 'Segoe UI', sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); max-width: 280px;
    white-space: pre-line; z-index: 10;
  }
  #legend {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    font: 12px 'Segoe UI', sans-serif;
  }
  #legend-toggle {
    width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer;
    background: rgba(44,62,80,0.82); color: #fff; font-size: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); display: flex;
    align-items: center; justify-content: center; margin-left: auto;
  }
  #legend-toggle:hover { background: rgba(44,62,80,1); }
  #legend-panel {
    display: none; margin-top: 6px; background: rgba(44,62,80,0.92);
    color: #fff; border-radius: 8px; padding: 10px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); min-width: 120px;
  }
  #legend-panel.open { display: block; }
  .legend-title {
    font-weight: 600; font-size: 12px; margin-bottom: 6px;
    color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 2px 0; font-size: 12px;
  }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
  }
  .legend-empty {
    color: rgba(255,255,255,0.5); font-style: italic; font-size: 11px;
  }
</style>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/elkjs@0.9.3/lib/elk.bundled.js"></script>
<script src="https://unpkg.com/cytoscape-elk@2.2.0/dist/cytoscape-elk.js"></script>
</head>
<body>
<div id="cy"></div>
<div id="tooltip"></div>
<div id="legend">
  <button id="legend-toggle" title="Toggle legend">ℹ</button>
  <div id="legend-panel">
    <div class="legend-title">Level Colours</div>
    <div id="legend-items"><span class="legend-empty">No data</span></div>
  </div>
</div>
<script>
cytoscape.use(cytoscapeElk);

document.getElementById('legend-toggle').addEventListener('click', function () {
  var panel = document.getElementById('legend-panel');
  var open = panel.classList.toggle('open');
  this.textContent = open ? '×' : 'ℹ';
  this.title = open ? 'Hide legend' : 'Toggle legend';
});

var levelColors = [
  '#2E75B6', '#27AE60', '#E67E22', '#8E44AD', '#E74C3C',
  '#16A085', '#D35400', '#2980B9', '#C0392B', '#7D3C98'
];

function shadeColor(hex, amount) {
  var num = parseInt(hex.replace('#', ''), 16);
  var r = Math.min(255, Math.max(0, (num >> 16) + amount));
  var g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amount));
  var b = Math.min(255, Math.max(0, (num & 0xFF) + amount));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

var cy = cytoscape({
  container: document.getElementById('cy'),
  style: [
    {
      selector: 'node',
      style: {
        'shape': 'roundrectangle',
        'width': 'label',
        'height': 'label',
        'padding': '10px',
        'background-color': 'data(color)',
        'background-opacity': 0.92,
        'border-width': 2,
        'border-color': 'data(borderColor)',
        'label': 'data(label)',
        'text-wrap': 'wrap',
        'text-valign': 'center',
        'text-halign': 'center',
        'color': '#fff',
        'font-size': '11px',
        'font-family': "'Segoe UI', sans-serif",
        'text-outline-width': 0
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 1.8,
        'line-color': '#B0BEC5',
        'target-arrow-color': '#78909C',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 1.1,
        'opacity': 0.8
      }
    },
    {
      selector: 'node:selected',
      style: {
        'border-width': 3,
        'border-color': '#FFD700',
        'background-opacity': 1
      }
    },
    {
      selector: 'node.highlighted',
      style: {
        'border-width': 3,
        'border-color': '#FFD700'
      }
    },
    {
      selector: 'edge.highlighted',
      style: {
        'line-color': '#E74C3C',
        'target-arrow-color': '#E74C3C',
        'width': 3,
        'opacity': 1,
        'z-index': 10
      }
    },
    {
      selector: 'node.dimmed',
      style: {
        'opacity': 0.25
      }
    },
    {
      selector: 'edge.dimmed',
      style: {
        'opacity': 0.1
      }
    }
  ],
  elements: [],
  layout: { name: 'grid' },
  wheelSensitivity: 0.3,
  minZoom: 0.1,
  maxZoom: 5
});

var tooltip = document.getElementById('tooltip');

cy.on('mouseover', 'node', function (e) {
  var n = e.target.data();
  var lines = [n.id];
  if (n.sn > 0 || n.level > 0) lines.push('SN: ' + n.sn + '   Level: ' + n.level);
  if (n.exit) lines.push('Exit: ' + n.exit);
  tooltip.textContent = lines.join('\n');
  tooltip.style.display = 'block';
});

cy.on('mousemove', 'node', function (e) {
  var pos = e.renderedPosition || e.cyRenderedPosition;
  tooltip.style.left = (pos.x + 14) + 'px';
  tooltip.style.top = (pos.y + 14) + 'px';
});

cy.on('mouseout', 'node', function () {
  tooltip.style.display = 'none';
});

var highlightDepth = 1;

function setHighlightDepth(depth) {
  highlightDepth = Math.max(1, Math.min(depth, 10));
}

cy.on('tap', 'node', function (e) {
  cy.elements().removeClass('highlighted dimmed');
  var node = e.target;
  var collected = node.closedNeighborhood();
  for (var i = 1; i < highlightDepth; i++) {
    var expanded = cy.collection();
    collected.nodes().forEach(function (n) {
      expanded = expanded.merge(n.closedNeighborhood());
    });
    collected = collected.merge(expanded);
  }
  cy.elements().not(collected).addClass('dimmed');
  collected.addClass('highlighted');
});

cy.on('tap', function (e) {
  if (e.target === cy) {
    cy.elements().removeClass('highlighted dimmed');
  }
});

var elkLayoutOptions = {
  name: 'elk',
  elk: {
    algorithm: 'layered',
    'elk.direction': 'DOWN',
    'elk.layered.spacing.nodeNodeBetweenLayers': '80',
    'elk.layered.spacing.nodeNode': '40',
    'elk.layered.nodePlacement.strategy': 'BRANDES_KOEPF',
    'elk.layered.wrapping.strategy': 'MULTI_EDGE',
    'elk.layered.compaction.connectedComponents': 'true',
    'elk.layered.compaction.postCompaction.strategy': 'EDGE_LENGTH'
  }
};

var currentLayout = null;

function stopCurrentLayout() {
  if (currentLayout) {
    currentLayout.stop();
    currentLayout = null;
  }
}

function runFullLayout(fit) {
  stopCurrentLayout();
  currentLayout = cy.layout(Object.assign({}, elkLayoutOptions, {
    animate: false,
    fit: fit,
    padding: 30,
    stop: function () { currentLayout = null; }
  }));
  currentLayout.run();
}

function positionNewNodesNearNeighbors(addedNodeIds, edges) {
  var addedSet = {};
  addedNodeIds.forEach(function (id) { addedSet[id] = true; });

  // Build adjacency from edge data, tracking direction
  var parents = {};  // parents[id] = list of source nodes that have edges TO id
  var children = {}; // children[id] = list of target nodes that id has edges TO
  edges.forEach(function (e) {
    if (!parents[e.target]) parents[e.target] = [];
    parents[e.target].push(e.source);
    if (!children[e.source]) children[e.source] = [];
    children[e.source].push(e.target);
  });

  var bb = cy.nodes().boundingBox();
  var fallbackX = (bb.x1 + bb.x2) / 2;
  var fallbackY = bb.y2 + 80;

  addedNodeIds.forEach(function (id, index) {
    // Find existing neighbors (parents go above, children go below in DOWN layout)
    var parentPositions = [];
    (parents[id] || []).forEach(function (pid) {
      if (!addedSet[pid]) {
        var n = cy.getElementById(pid);
        if (n.nonempty()) parentPositions.push(n.position());
      }
    });

    var childPositions = [];
    (children[id] || []).forEach(function (cid) {
      if (!addedSet[cid]) {
        var n = cy.getElementById(cid);
        if (n.nonempty()) childPositions.push(n.position());
      }
    });

    var allPositions = parentPositions.concat(childPositions);
    var pos;

    if (allPositions.length > 0) {
      var ax = 0, ay = 0;
      allPositions.forEach(function (p) { ax += p.x; ay += p.y; });
      ax /= allPositions.length;
      ay /= allPositions.length;

      // Place below parents or above children, with horizontal spread to avoid overlap
      var yOffset = parentPositions.length > 0 ? 80 : (childPositions.length > 0 ? -80 : 0);
      var spread = (index - (addedNodeIds.length - 1) / 2) * 50;
      pos = { x: ax + spread, y: ay + yOffset };
    } else {
      // No connected existing nodes: place below the current graph
      pos = { x: fallbackX + (index - (addedNodeIds.length - 1) / 2) * 60, y: fallbackY + index * 40 };
    }

    cy.getElementById(id).position(pos);
  });
}

function buildNodeData(n) {
  var lvl = n.level || 0;
  var color = levelColors[lvl % levelColors.length];
  var borderColor = shadeColor(color, -30);
  var label = n.id;
  if (n.sn > 0 || n.level > 0) {
    label += '\nSN:' + n.sn + '  L:' + n.level;
  }
  return { id: n.id, label: label, color: color, borderColor: borderColor, sn: n.sn, level: n.level, exit: n.exit };
}

function renderGraph(jsonStr) {
  var data = JSON.parse(jsonStr);

  if (!data.nodes || data.nodes.length === 0) {
    stopCurrentLayout();
    cy.elements().remove();
    updateLegend();
    return;
  }

  var hadElements = cy.nodes().length > 0;

  // Build lookup maps for new data
  var newNodeMap = {};
  data.nodes.forEach(function (n) { newNodeMap[n.id] = n; });
  var newEdgeMap = {};
  data.edges.forEach(function (e) { newEdgeMap[e.source + '->' + e.target] = e; });

  // Remove nodes no longer present (also removes their connected edges)
  cy.nodes().filter(function (node) { return !newNodeMap[node.id()]; }).remove();
  // Remove remaining edges no longer present
  cy.edges().filter(function (edge) { return !newEdgeMap[edge.id()]; }).remove();

  // Add or update nodes, tracking which ones are new
  var addedNodeIds = [];
  data.nodes.forEach(function (n) {
    var nodeData = buildNodeData(n);
    var existing = cy.getElementById(n.id);
    if (existing.nonempty()) {
      existing.data(nodeData);
    } else {
      cy.add({ group: 'nodes', data: nodeData });
      addedNodeIds.push(n.id);
    }
  });

  // Add new edges
  data.edges.forEach(function (e) {
    var edgeId = e.source + '->' + e.target;
    if (cy.getElementById(edgeId).empty()) {
      cy.add({ group: 'edges', data: { id: edgeId, source: e.source, target: e.target } });
    }
  });

  // Determine layout strategy
  if (!hadElements || addedNodeIds.length === data.nodes.length) {
    // First render or entirely new graph: full layout with fit
    runFullLayout(true);
  } else if (addedNodeIds.length > 0) {
    // Position new nodes near their connected existing neighbors
    positionNewNodesNearNeighbors(addedNodeIds, data.edges);
  }
  // else: only removals or data updates — positions and viewport are already preserved

  updateLegend();
}

function updateLegend() {
  var levels = {};
  cy.nodes().forEach(function (n) {
    var lvl = n.data('level') || 0;
    if (levels[lvl] === undefined) levels[lvl] = true;
  });
  var sorted = Object.keys(levels).map(Number).sort(function (a, b) { return a - b; });
  var container = document.getElementById('legend-items');
  if (sorted.length === 0) {
    container.innerHTML = '<span class="legend-empty">No data</span>';
    return;
  }
  var html = '';
  sorted.forEach(function (lvl) {
    var color = levelColors[lvl % levelColors.length];
    html += '<div class="legend-item">' +
      '<span class="legend-swatch" style="background:' + color + '"></span>' +
      'Level ' + lvl + '</div>';
  });
  container.innerHTML = html;
}

function resetView() {
  if (cy.nodes().length > 0) {
    cy.fit(cy.elements(), 30);
  }
}

function resetLayout() {
  if (cy.nodes().length > 0) {
    runFullLayout(true);
  }
}
</script>
</body>
</html>
